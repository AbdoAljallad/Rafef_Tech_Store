services:
  mysql:
    image: mysql:8.4
    container_name: rafef-tech-mysql84
    restart: unless-stopped
    env_file:
      - ./infrastructure/mysql/.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    ports:
      - "3306:3306"
    volumes:
      - rafef_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  adminer:
    image: adminer:5.4.0
    container_name: rafef-tech-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  localtranslate:
    build:
      context: .
      dockerfile: backend/translation-local/Dockerfile
    container_name: rafef-tech-localtranslate
    restart: unless-stopped
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      ARGOS_PACKAGE_PAIRS: en_ar,ar_en,en_ru,ru_en
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - localtranslate_data:/root/.local/share/argos-translate

  backend:
    image: node:20-alpine
    container_name: rafef-tech-backend
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./:/app
      - /app/backend/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_BASE_URL: http://rafeftech.home
      CORS_ORIGIN: http://rafeftech.home,http://localhost:5173,http://127.0.0.1:5173
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rafef_user
      MYSQL_PASSWORD: rafef_password
      MYSQL_DATABASE: rafef_tech
      SESSION_COOKIE_NAME: rt_session
      SESSION_TTL_HOURS: 12
      SESSION_SECRET: change-this-local-secret
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin123
      SEED_AI_ASSISTANT_PASSWORD: change-this-ai-assistant-password
      N8N_ENABLED: "false"
      N8N_WEBHOOK_URL: http://host.docker.internal:5678/webhook/rafef-tech
      N8N_HEALTH_URL: http://host.docker.internal:5678/healthz
      N8N_SHARED_SECRET: change-this-n8n-secret
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-localtranslate}
      LOCAL_TRANSLATE_URL: ${LOCAL_TRANSLATE_URL:-http://host.docker.internal:5002}
      MICROSOFT_TRANSLATOR_ENDPOINT: ${MICROSOFT_TRANSLATOR_ENDPOINT:-https://api.cognitive.microsofttranslator.com}
      MICROSOFT_TRANSLATOR_KEY: ${MICROSOFT_TRANSLATOR_KEY:-}
      MICROSOFT_TRANSLATOR_REGION: ${MICROSOFT_TRANSLATOR_REGION:-}
      OPENCLAW_ENABLED: "false"
      OPENCLAW_GATEWAY_URL: http://host.docker.internal:18790
    extra_hosts:
      - "host.docker.internal:172.20.0.1"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: sh -c "npm ci --silent || npm install --no-audit --no-fund && npm run db:setup && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: rafef-tech-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:3000
    command: sh -c "npm ci --silent || npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"

  caddy:
    image: caddy:latest
    container_name: rafef-tech-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  rafef_mysql_data:
  caddy_data:
  caddy_config:
  localtranslate_data:
